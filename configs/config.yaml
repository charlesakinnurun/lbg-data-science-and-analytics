# General settings
project_name: "Churn Prediction"
random_state: 42

# Paths
data_path: "data/Churn_Model_Ready.xlsx"
model_save_path: "models/best_rf_model.pkl"

# Data Splitting
test_size: 0.2

# Model Hyperparameters (Random Forest)
rf_params:
  n_estimators: 305
  max_depth: 9
  min_samples_split: 4
  class_weight: "balanced"

# XGBoost Params
xgb_params:
  n_estimators: 100
  learning_rate: 0.1
  max_depth: 4
  eval_metric: "logloss"
  scale_pos_weight: 3.9 # Based on churn rate (796/204)

# Hyperparameter Search
n_iter_search: 50
cv_folds: 5